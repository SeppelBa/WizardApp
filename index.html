<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wizard Punkteblock Pro</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<meta name="theme-color" content="#18122B">

<style>
    *{ box-sizing:border-box; margin:0; padding:0; font-family: sans-serif; }
    body{ background: linear-gradient(180deg,#18122B,#251B37); color:white; min-height:100vh; padding: 10px 10px 80px 10px; }
    .container{ max-width:600px; margin:auto; }
    h1{ text-align:center; margin-bottom:15px; color: #A855F7; }
    .card{ background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); border-radius:18px; padding:15px; margin-bottom:15px; backdrop-filter: blur(10px); }
    
    .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #3B1E54; display: flex; justify-content: space-around; padding: 10px; z-index: 100; }
    .nav-item { color: rgba(255,255,255,0.6); font-size: 0.8rem; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .nav-item.active { color: #A855F7; font-weight: bold; }

    input, button { border:none; border-radius:12px; padding:12px; font-size:1rem; }
    input { background:#fff; color:#111; width: 100%; }
    button { background:#A855F7; color:white; font-weight:bold; cursor:pointer; }
    
    .playerRow { display:grid; grid-template-columns:1fr 70px 70px; gap:8px; align-items:center; margin-bottom: 10px; }
    .playerName { font-weight:bold; font-size:0.9rem; overflow: hidden; text-overflow: ellipsis; }

    table { width:100%; border-collapse:collapse; margin-top:10px; font-size: 0.85rem; }
    th, td { border:1px solid rgba(255,255,255,0.1); padding:8px; text-align:center; }
    th { background:#3B1E54; color: #A855F7; }

    .winner-banner { margin-top:12px; padding:15px; background:#22C55E; border-radius:12px; text-align:center; font-weight:bold; }
    .highscore-item { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
    .highscore-item:active { background: rgba(255,255,255,0.05); }

    .hidden { display: none; }
    .reset-btn { background: #ef4444; width: 100%; margin-top: 20px; }
    .details-box { background: rgba(168, 85, 247, 0.1); border: 1px solid #A855F7; padding: 10px; border-radius: 10px; margin-top: 5px; font-size: 0.85rem; }
</style>
</head>
<body>

<div class="container">
    <h1 id="mainTitle">🧙 Wizard Block</h1>

    <!-- SPIEL SEITE -->
    <div id="page-game">
        <div class="card" id="setupCard">
            <div class="setup" style="display:flex; flex-direction:column; gap:10px;">
                <label>Spieleranzahl (3-6)</label>
                <input type="number" id="playerCount" min="3" max="6" value="4">
                <button onclick="createPlayerInputs()">Namen eingeben</button>
                <div id="playerInputs" style="display:flex; flex-direction:column; gap:8px;"></div>
            </div>
        </div>

        <div id="gameArea" class="hidden">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <div id="roundInfo" style="font-weight:bold;"></div>
                    <button onclick="nextRound()">Runde fertig</button>
                </div>
                <div id="roundInputs"></div>
            </div>

            <div class="card" style="overflow-x:auto;">
                <table id="scoreTable">
                    <thead><tr id="tableHead"><th>Rd</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                    <tfoot><tr id="totalRow" style="font-weight:bold; background:rgba(168, 85, 247, 0.2);"><td>Σ</td></tr></tfoot>
                </table>
                <div id="winnerBox"></div>
                <button class="reset-btn" onclick="resetGame()">Spiel abbrechen</button>
            </div>
        </div>
    </div>

    <!-- LEADERBOARD SEITE -->
    <div id="page-leaderboard" class="hidden">
        <div class="card">
            <h2>🏆 Bestenliste</h2>
            <p style="font-size: 0.7rem; opacity: 0.6; margin-bottom:10px;">Tippe auf einen Namen für Details</p>
            <div id="leaderboardList"></div>
            <button class="reset-btn" style="background:#444;" onclick="clearLeaderboard()">Statistik löschen</button>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" id="nav-game" onclick="showPage('game')"><span>🎮</span><span>Spiel</span></div>
    <div class="nav-item" id="nav-leaderboard" onclick="showPage('leaderboard')"><span>🏆</span><span>Statistik</span></div>
</div>

<script>
let players = [];
let scores = {};
let round = 1;
let maxRounds = 0;
let gameFinished = false;

window.onload = function() {
    const saved = localStorage.getItem('wizardGame');
    if (saved) {
        const data = JSON.parse(saved);
        players = data.players; scores = data.scores; round = data.round;
        maxRounds = data.maxRounds; gameFinished = data.gameFinished || false;
        document.getElementById("setupCard").classList.add("hidden");
        document.getElementById("gameArea").classList.remove("hidden");
        rebuildUI();
    }
};

function showPage(p) {
    document.getElementById('page-game').classList.add('hidden');
    document.getElementById('page-leaderboard').classList.add('hidden');
    document.getElementById('nav-game').classList.remove('active');
    document.getElementById('nav-leaderboard').classList.remove('active');
    document.getElementById('page-' + p).classList.remove('hidden');
    document.getElementById('nav-' + p).classList.add('active');
    if(p === 'leaderboard') updateLeaderboardUI();
}

function createPlayerInputs(){
    const c = document.getElementById("playerCount").value;
    const con = document.getElementById("playerInputs");
    con.innerHTML = "";
    for(let i=0;i<c;i++) con.innerHTML += `<input type="text" placeholder="Name Spieler ${i+1}" id="player${i}">`;
    con.innerHTML += `<button onclick="startGame(${c})">Start!</button>`;
}

function startGame(c){
    players = [];
    for(let i=0;i<c;i++){
        const n = document.getElementById(`player${i}`).value.trim();
        if(!n) return alert("Namen fehlen!");
        players.push(n); scores[n] = [];
    }
    maxRounds = Math.floor(60 / c);
    document.getElementById("setupCard").classList.add("hidden");
    document.getElementById("gameArea").classList.remove("hidden");
    rebuildUI();
}

function rebuildUI() {
    const head = document.getElementById("tableHead");
    const totalRow = document.getElementById("totalRow");
    head.innerHTML = "<th>Rd</th>"; totalRow.innerHTML = "<td>Σ</td>";
    players.forEach(p => {
        head.innerHTML += `<th>${p.substring(0,4)}</th>`;
        totalRow.innerHTML += `<td id="total-${p}">0</td>`;
    });

    const body = document.getElementById("tableBody");
    body.innerHTML = "";
    for(let r=0; r < scores[players[0]].length; r++) {
        let row = `<tr><td>${r+1}</td>`;
        players.forEach(p => {
            let pts = scores[p][r];
            row += `<td style="color:${pts<0?'#ff4d4d':'#22C55E'}">${pts>0?'+':''}${pts}</td>`;
        });
        body.innerHTML += row + "</tr>";
    }
    players.forEach(p => {
        const t = scores[p].reduce((a,b)=>a+b,0);
        document.getElementById(`total-${p}`).innerText = t;
    });
    if(round > maxRounds) endGame(); else renderRoundInputs();
    saveGame();
}

function renderRoundInputs(){
    document.getElementById("roundInfo").innerText = `Rd. ${round} (${round} Karten)`;
    const con = document.getElementById("roundInputs");
    con.innerHTML = "";
    players.forEach(p => {
        con.innerHTML += `
            <div class="playerRow">
                <div class="playerName">${p}</div>
                <input type="number" id="bid-${p}" placeholder="Tipp" max="${round}" inputmode="numeric">
                <input type="number" id="tricks-${p}" placeholder="Stiche" max="${round}" inputmode="numeric">
            </div>`;
    });
}

function nextRound(){
    if(gameFinished) return;
    let totalTricksEntered = 0;
    try {
        players.forEach(p => {
            const b = parseInt(document.getElementById(`bid-${p}`).value);
            const t = parseInt(document.getElementById(`tricks-${p}`).value);
            if(isNaN(b) || isNaN(t)) throw "empty";
            totalTricksEntered += t;
        });

        // FEHLER-CHECK: Zu viele Stiche?
        if(totalTricksEntered !== round) {
            alert(`STOPP! In Runde ${round} muss es genau ${round} Stiche geben. Du hast ${totalTricksEntered} eingegeben.`);
            return;
        }

        players.forEach(p => {
            const b = parseInt(document.getElementById(`bid-${p}`).value);
            const t = parseInt(document.getElementById(`tricks-${p}`).value);
            let pts = (b === t) ? (20 + t * 10) : (Math.abs(b - t) * -10);
            scores[p].push(pts);
        });
        round++;
        rebuildUI();
    } catch(e) { alert("Bitte alle Tipps und Stiche eintragen!"); }
}

function saveGame() {
    localStorage.setItem('wizardGame', JSON.stringify({ players, scores, round, maxRounds, gameFinished }));
}

function resetGame() { if(confirm("Spiel wirklich löschen?")) { localStorage.removeItem('wizardGame'); location.reload(); } }

function endGame(){
    gameFinished = true; saveGame();
    document.getElementById("roundInfo").innerText = "Spiel beendet";
    document.getElementById("roundInputs").innerHTML = "";
    let winner = players.reduce((a, b) => scores[a].reduce((s,v)=>s+v,0) > scores[b].reduce((s,v)=>s+v,0) ? a : b);
    document.getElementById("winnerBox").innerHTML = `<div class="winner-banner">🏆 ${winner} gewinnt!</div>`;
    
    // Leaderboard Update
    let stats = JSON.parse(localStorage.getItem('wizardStats') || '{}');
    players.forEach(p => {
        if(!stats[p]) stats[p] = { wins: 0, totalPoints: 0, games: 0 };
        const pScore = scores[p].reduce((a,b)=>a+b,0);
        stats[p].totalPoints += pScore;
        stats[p].games += 1;
        if(p === winner) stats[p].wins += 1;
    });
    localStorage.setItem('wizardStats', JSON.stringify(stats));
}

function updateLeaderboardUI() {
    const con = document.getElementById("leaderboardList");
    const stats = JSON.parse(localStorage.getItem('wizardStats') || '{}');
    con.innerHTML = "";
    const sorted = Object.entries(stats).sort((a,b) => b[1].wins - a[1].wins);
    
    if(sorted.length === 0) { con.innerHTML = "<p>Noch keine Daten.</p>"; return; }

    sorted.forEach(([name, data]) => {
        const item = document.createElement("div");
        item.className = "highscore-item";
        item.innerHTML = `
            <div style="display:flex; justify-content:space-between;">
                <span><strong>${name}</strong></span>
                <span style="color:#A855F7;">${data.wins} Siege</span>
            </div>
            <div id="details-${name}" class="details-box hidden">
                Gesamt-Punkte: ${data.totalPoints}<br>
                Spiele gesamt: ${data.games}<br>
                Ø Punkte/Spiel: ${Math.round(data.totalPoints / data.games)}
            </div>
        `;
        item.onclick = () => document.getElementById(`details-${name}`).classList.toggle('hidden');
        con.appendChild(item);
    });
}

function clearLeaderboard() { if(confirm("Statistiken löschen?")) { localStorage.removeItem('wizardStats'); updateLeaderboardUI(); } }
</script>
</body>
</html>
